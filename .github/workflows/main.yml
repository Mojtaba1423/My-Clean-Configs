name: Mojtaba Reality Update V7.4

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Go prober
        run: |
          go version
          go build -o prober ./prober.go
          chmod +x ./prober
          ls -lh ./prober

      - name: Run Surgeon
        env:
          SURGEON_PROBER_BIN: ./prober
        run: |
          python surgeon.py

      - name: Fail if output is empty
        run: |
          if [[ ! -s MOJTABA_CLEAN_LIST.txt ]]; then
            echo "::error::MOJTABA_CLEAN_LIST.txt is empty. Surgeon failed to produce configs."

            if [[ -f surgeon_telemetry.json ]]; then
              echo "=== surgeon_telemetry.json ==="
              cat surgeon_telemetry.json
            fi

            if [[ -f network_test_log.txt ]]; then
              echo "=== network_test_log.txt ==="
              cat network_test_log.txt
            else
              echo "No network logs found."
            fi

            exit 1
          fi

      - name: Update Timestamp
        run: |
          date +%s > .last_successful_update

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add MOJTABA_CLEAN_LIST.txt .last_successful_update

