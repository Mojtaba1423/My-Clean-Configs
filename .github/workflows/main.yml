name: Mojtaba Reality Update V7.3

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Surgeon
        run: |
          python surgeon.py

      - name: Fail if output is empty
        run: |
          if [[ ! -s MOJTABA_CLEAN_LIST.txt ]]; then
            echo "MOJTABA_CLEAN_LIST.txt is empty."
            exit 1
          fi

      - name: Update Timestamp
        run: |
          date +%s > .last_successful_update

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add MOJTABA_CLEAN_LIST.txt .last_successful_update

          # telemetry may or may not exist (but in our surgeon it will)
          if [[ -f surgeon_telemetry.json ]]; then
            git add surgeon_telemetry.json
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update reality list (V7.3)"
          git push
