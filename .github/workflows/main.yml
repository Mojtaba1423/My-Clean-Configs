name: Mojtaba Reality Update V7

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

permissions:
  contents: write

concurrency:
  group: mojtaba-reality-update
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  surge:
    name: Run Surgeon
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: 🚀 Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: 📦 Install Dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: ⚙️ Run Surgeon
        shell: bash
        run: |
          set -euo pipefail
          python surgeon.py

      - name: ✅ Fail if output is empty
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -s MOJTABA_CLEAN_LIST.txt ]]; then
            echo "MOJTABA_CLEAN_LIST.txt is empty."
            exit 1
          fi

      - name: 📤 Commit & Push
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add MOJTABA_CLEAN_LIST.txt
          [[ -f surgeon_telemetry.json ]] && git add surgeon_telemetry.json || true

          if git diff --cached --quiet; then
            echo "✅ No changes to commit."
            exit 0
          fi

          git commit -m "Auto Update: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
