name: Mojtaba Reality Update V7

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

concurrency:
  group: mojtaba-reality-update
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  surge:
    name: Run Surgeon
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 🚀 Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: ⏱️ Check 3-Hour Gate
        id: gate
        shell: bash
        run: |
          set -euo pipefail

          NOW=$(date -u +%s)
          FILE=".last_successful_update"

          if [[ ! -f "$FILE" ]]; then
            echo "No previous timestamp found. Allowing run."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_RAW="$(tr -d '\r\n' < "$FILE")"
          LAST=$(date -u -d "$LAST_RAW" +%s 2>/dev/null || echo 0)
          DIFF=$((NOW - LAST))

          echo "Last successful update: $LAST_RAW"
          echo "Elapsed since last update: $DIFF seconds"

          if [[ "$DIFF" -ge 10800 ]]; then
            echo "3 hours passed. Running workflow."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Less than 3 hours. Skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 📦 Install Dependencies
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: ⚙️ Run Surgeon
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python surgeon.py

      - name: 📝 Update Timestamp
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .last_successful_update

      - name: 📤 Commit & Push
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add MOJTABA_CLEAN_LIST.txt
          [[ -f surgeon_telemetry.json ]] && git add surgeon_telemetry.json || true
          git add .last_successful_update

          if git diff --cached --quiet; then
            echo "✅ No changes to commit."
            exit 0
          fi

          git commit -m "Auto Update: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
