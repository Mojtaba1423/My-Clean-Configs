name: Mojtaba Reality Update V7.8

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

concurrency:
  group: mojtaba-reality-update-v7-8
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Syntax check surgeon.py
        run: python -m py_compile surgeon.py

      - name: Build Go prober
        run: |
          echo "Building prober..."
          go version
          go build -o prober ./prober.go
          chmod +x ./prober
          ls -lh ./prober

      - name: Run Surgeon
        env:
          LIVE_TEST_BINARY: ./prober
          LIVE_TEST_CONCURRENCY: "300"
          LIVE_TEST_TIMEOUT_MS: "3000"
          LIVE_TEST_PROCESS_TIMEOUT_SEC: "300"
          LIVE_TEST_ATTEMPTS: "1"
          LIVE_TEST_TCP_ATTEMPTS: "1"
          LIVE_TEST_TLS_ATTEMPTS: "1"
          LIVE_TEST_ATTEMPT_PAUSE_MS: "50"
          PROBE_CANDIDATE_LIMIT: "900"
          MAX_OUTPUT: "128"
          MAX_PER_HOST: "2"
        run: |
          echo "Running surgeon..."
          python surgeon.py

      - name: Show telemetry
        if: always()
        run: |
          if [[ -f surgeon_telemetry.json ]]; then
            echo "=== surgeon telemetry ==="
            cat surgeon_telemetry.json
          else
            echo "telemetry not found"
          fi

      - name: Fail if output is empty
        run: |
          if [[ ! -s m_configs.txt ]]; then
            echo "::error::m_configs.txt is empty. Surgeon produced no configs."
            exit 1
          fi

      - name: Update Timestamp
        run: date +%s > .last_successful_update

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add m_configs.txt .last_successful_update

          if [[ -f surgeon_telemetry.json ]]; then
            git add surgeon_telemetry.json
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Mojtaba Reality Update V7.8"
            git push
          fi
